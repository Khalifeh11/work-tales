<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Worktales — Website UI Kit</title>
<link rel="icon" href="../../assets/favicon.ico" type="image/x-icon" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="site.css">
<style>
  /* The kit scrolls within its own frame; this keeps the body dark edge-to-edge. */
  html, body { background: #000; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="TalentPage.jsx"></script>
<script type="text/babel" src="TrainingPage.jsx"></script>
<script type="text/babel" src="ConnectPage.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;

  const validPages = ["home", "talent", "build", "connect"];
  const pageFromHash = () => {
    const h = (window.location.hash || "").replace("#", "");
    return validPages.includes(h) ? h : "home";
  };

  function App() {
    const [page, setPage] = useState(pageFromHash);
    const [scrolled, setScrolled] = useState(false);

    useEffect(() => {
      const onScroll = () => setScrolled(window.scrollY > 24);
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
      const onHash = () => setPage(pageFromHash());
      window.addEventListener("hashchange", onHash);
      return () => {
        window.removeEventListener("scroll", onScroll);
        window.removeEventListener("hashchange", onHash);
      };
    }, []);

    const navigate = (p) => {
      setPage(p);
      // keep the URL in sync so the page is deep-linkable / previewable
      if (("#" + p) !== window.location.hash) {
        history.replaceState(null, "", p === "home" ? "#" : "#" + p);
      }
    };

    return (
      <React.Fragment>
        <Header scrolled={scrolled} onNavigate={navigate} current={page} />
        {page === "home" ? <HomePage onNavigate={navigate} /> : page === "build" ? <TrainingPage onNavigate={navigate} /> : page === "connect" ? <ConnectPage onNavigate={navigate} /> : <TalentPage onNavigate={navigate} />}
        <Footer onNavigate={navigate} />
      </React.Fragment>
    );
  }

  // Wait for the babel-loaded component scripts to register on window.
  function boot() {
    if (window.Header && window.Footer && window.HomePage && window.TalentPage && window.TrainingPage && window.ConnectPage) {
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    } else {
      setTimeout(boot, 30);
    }
  }
  boot();
</script>
</body>
</html>
