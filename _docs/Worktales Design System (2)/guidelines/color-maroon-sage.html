<!-- @dsCard group="Colors" viewport="700x190" name="Brand · Maroon & Sage" subtitle="Maroon for warmth/depth; sage as the cool quiet accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--color-border); }
  .chip { height: 76px; }
  .meta { padding: 9px 12px; background: var(--wt-ink-800); }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--color-text); }
  .hex { font-family: var(--font-sans); font-size: 11px; color: var(--color-text-muted); margin-top: 2px; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--wt-maroon)"></div><div class="meta"><div class="name">Maroon</div><div class="hex">#4A1114</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wt-maroon-deep)"></div><div class="meta"><div class="name">Maroon Deep</div><div class="hex">#190707</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wt-sage)"></div><div class="meta"><div class="name">Sage</div><div class="hex">#B3C9C6</div></div></div>
  </div>
</body>
</html>
