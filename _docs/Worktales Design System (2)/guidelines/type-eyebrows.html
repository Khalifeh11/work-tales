<!-- @dsCard group="Type" viewport="700x150" name="Eyebrows & Labels" subtitle="Bold uppercase, wide tracking, orange — the section marker" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 26px 24px; }
  .stack { display: flex; flex-direction: column; gap: 16px; align-items: flex-start; }
  .eyebrow { text-transform: uppercase; letter-spacing: var(--tracking-eyebrow); color: var(--color-accent); font-size: var(--text-eyebrow); font-weight: var(--weight-bold); font-family: var(--font-sans); }
  .num { font-family: var(--font-sans); font-size: 0.75rem; font-weight: var(--weight-bold); letter-spacing: var(--tracking-widest); color: var(--color-accent); }
  .tag { font-family: var(--font-sans); font-size: var(--text-micro); font-weight: var(--weight-bold); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--wt-sage); padding: 5px 12px; border: 1px solid var(--color-border-strong); border-radius: var(--radius-pill); }
</style>
</head>
<body>
  <div class="stack">
    <div class="eyebrow">For organizations</div>
    <div class="num">01 / Hire</div>
    <div class="tag">Coming soon</div>
  </div>
</body>
</html>
