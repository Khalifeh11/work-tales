<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base — orange bars sized to each token" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 24px; font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--gradient-accent); border-radius: 3px; width: 100%; }
  .item { width: 52px; }
  .lbl { font-size: 10.5px; color: var(--color-text); font-weight: 600; }
  .px { font-size: 9.5px; color: var(--color-text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:8px"></div><div class="lbl">2</div><div class="px">8px</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="lbl">4</div><div class="px">16px</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="lbl">6</div><div class="px">24px</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="lbl">8</div><div class="px">32px</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="lbl">12</div><div class="px">48px</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="lbl">16</div><div class="px">64px</div></div>
    <div class="item"><div class="bar" style="height:80px"></div><div class="lbl">20</div><div class="px">80px</div></div>
  </div>
</body>
</html>
