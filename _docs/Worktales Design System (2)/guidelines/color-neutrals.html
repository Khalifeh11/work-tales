<!-- @dsCard group="Colors" viewport="700x190" name="Neutrals · Ink & Text" subtitle="Black canvas, ink surfaces, and the text ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 24px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 124px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--color-border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--wt-ink-800); }
  .name { font-family: var(--font-sans); font-size: 11.5px; font-weight: 600; color: var(--color-text); }
  .hex { font-family: var(--font-sans); font-size: 10.5px; color: var(--color-text-muted); margin-top: 2px; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--wt-black)"></div><div class="meta"><div class="name">Black</div><div class="hex">#000000</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wt-ink-900)"></div><div class="meta"><div class="name">Ink 900</div><div class="hex">#0C0A0A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wt-ink-800)"></div><div class="meta"><div class="name">Ink 800</div><div class="hex">#120E0E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wt-white)"></div><div class="meta"><div class="name">White</div><div class="hex">#F1F1F2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wt-gray)"></div><div class="meta"><div class="name">Gray (muted)</div><div class="hex">#8A8D8F</div></div></div>
  </div>
</body>
</html>
