<!-- @dsCard group="Spacing" viewport="700x180" name="Radii" subtitle="From 8px tiles to fully-pill CTAs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 24px; font-family: var(--font-sans); }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 78px; height: 78px; background: var(--gradient-card); border: 1px solid var(--color-border-strong); }
  .pill { width: 110px; height: 44px; border-radius: var(--radius-pill); background: var(--color-accent); }
  .lbl { font-size: 11px; color: var(--color-text); font-weight: 600; }
  .px { font-size: 10px; color: var(--color-text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md</div><div class="px">12px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl</div><div class="px">16px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="lbl">2xl</div><div class="px">18px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-3xl)"></div><div class="lbl">3xl</div><div class="px">20px</div></div>
    <div class="item"><div class="pill"></div><div class="lbl">pill</div><div class="px">999px</div></div>
  </div>
</body>
</html>
