<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--color-border); }
  .chip { height: 76px; }
  .meta { padding: 9px 12px; background: var(--wt-ink-800); }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--color-text); }
  .hex { font-family: var(--font-sans); font-size: 11px; color: var(--color-text-muted); margin-top: 2px; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--wt-orange)"></div><div class="meta"><div class="name">Orange</div><div class="hex">#EF5023</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wt-orange-bright)"></div><div class="meta"><div class="name">Orange Bright</div><div class="hex">#FF7A3F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wt-orange-hover)"></div><div class="meta"><div class="name">Orange Hover</div><div class="hex">#FF6638</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wt-orange-glow)"></div><div class="meta"><div class="name">Orange Glow</div><div class="hex">#FF8B5A</div></div></div>
  </div>
</body>
</html>
