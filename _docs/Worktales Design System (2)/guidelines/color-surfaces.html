<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & Borders" subtitle="Translucent card fills and hairline borders over black" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .tile { width: 150px; height: 88px; border-radius: var(--radius-xl); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .t1 { background: var(--gradient-card); border: 1px solid var(--color-border-strong); }
  .t2 { background: var(--wt-surface); border: 1px solid var(--color-border); }
  .t3 { background: var(--wt-surface-strong); border: 1px solid var(--color-border-accent); }
  .t4 { background: var(--wt-orange-soft); border: 1px solid var(--color-border-accent); }
  .name { font-family: var(--font-sans); font-size: 11.5px; font-weight: 600; color: var(--color-text); }
  .desc { font-family: var(--font-sans); font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile t1"><div class="name">Card</div><div class="desc">gradient + hairline</div></div>
    <div class="tile t2"><div class="name">Surface</div><div class="desc">ink @ 82%</div></div>
    <div class="tile t3"><div class="name">Surface Strong</div><div class="desc">maroon @ 85%</div></div>
    <div class="tile t4"><div class="name">Orange Soft</div><div class="desc">icon-tile wash</div></div>
  </div>
</body>
</html>
