<!-- @dsCard group="Type" viewport="700x200" name="Display & Hero" subtitle="Montserrat Medium 500, tight negative tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 28px 24px; }
  .hero { font-family: var(--font-display); font-size: var(--text-hero); font-weight: var(--weight-medium); letter-spacing: var(--tracking-tight); line-height: var(--leading-tight); color: var(--color-text); margin: 0; }
  .hero .em { background: var(--gradient-accent); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: var(--weight-bold); }
  .lbl { font-family: var(--font-sans); font-size: 11px; color: var(--color-text-muted); margin-top: 14px; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <h1 class="hero">People decisions are the <span class="em">real risk</span>.</h1>
  <div class="lbl">Montserrat · 500 · clamp(2.1–4rem) · tracking −0.025em · accent word in gradient 700</div>
</body>
</html>
