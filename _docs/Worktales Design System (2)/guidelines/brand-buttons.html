<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 28px 24px; font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 20px; align-items: flex-start; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 13px 28px; border-radius: var(--radius-pill); font-weight: 600; font-size: 0.92rem; letter-spacing: 0.02em; border: 1.5px solid transparent; font-family: inherit; cursor: pointer; }
  .primary { background: var(--color-accent); color: #fff; }
  .ghost { background: transparent; color: var(--color-text); border-color: rgba(241,241,242,0.30); }
  .link { display: inline-flex; align-items: center; gap: 8px; color: var(--color-accent); font-weight: 600; font-size: 0.88rem; letter-spacing: 0.04em; text-transform: uppercase; }
  .eyebrow { display: inline-flex; align-items: center; gap: 10px; padding: 8px 16px; border-radius: var(--radius-pill); border: 1px solid var(--color-border-strong); background: rgba(255,255,255,0.03); font-size: 0.78rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-text-secondary); }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--color-accent); }
</style>
</head>
<body>
  <div class="stack">
    <span class="eyebrow"><span class="pulse"></span> Built in Beirut · Global execution</span>
    <div class="row">
      <button class="btn primary">Schedule a call <i class="fas fa-arrow-right"></i></button>
      <button class="btn ghost">Explore services</button>
      <a class="link">See more <i class="fas fa-arrow-right"></i></a>
    </div>
  </div>
</body>
</html>
