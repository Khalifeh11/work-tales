<!-- @dsCard group="Type" viewport="700x230" name="Headings" subtitle="Section H2/H3 — medium weight, one accent word in orange" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 26px 24px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .h2 { font-family: var(--font-display); font-size: var(--text-h2); font-weight: var(--weight-medium); letter-spacing: var(--tracking-snug); line-height: var(--leading-heading); color: var(--color-text); margin: 0; }
  .h3 { font-family: var(--font-display); font-size: var(--text-h3); font-weight: var(--weight-semibold); letter-spacing: -0.01em; color: var(--color-text); margin: 0; }
  .accent { color: var(--color-accent); }
  .lbl { font-family: var(--font-sans); font-size: 11px; color: var(--color-text-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="stack">
    <h2 class="h2">One consultancy, <span class="accent">three pillars</span>, one outcome.</h2>
    <h3 class="h3">A hiring partner, <span class="accent">not a job board.</span></h3>
    <div class="lbl">H2 · 500 · tracking −0.015em  ·  H3 · 600 · −0.01em</div>
  </div>
</body>
</html>
