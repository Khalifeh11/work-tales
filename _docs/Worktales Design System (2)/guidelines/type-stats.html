<!-- @dsCard group="Type" viewport="700x180" name="Stat Numbers" subtitle="Big semibold figures with an orange rule — the proof band" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 24px; }
  .row { display: flex; gap: 0; border-top: 1px solid var(--color-border-strong); border-bottom: 1px solid var(--color-border-strong); }
  .stat { flex: 1; text-align: center; padding: 22px 16px; border-right: 1px solid var(--color-border-strong); }
  .stat:last-child { border-right: none; }
  .big { font-family: var(--font-display); font-size: var(--text-stat); font-weight: var(--weight-semibold); line-height: 1; letter-spacing: -0.03em; color: var(--color-text); }
  .rule { width: 32px; height: 2px; background: var(--color-accent); margin: 14px auto 0; }
  .lbl { margin-top: 11px; font-family: var(--font-sans); font-size: 0.78rem; color: var(--color-text-secondary); letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="stat"><div class="big">90%</div><div class="rule"></div><div class="lbl">Satisfaction</div></div>
    <div class="stat"><div class="big">65%</div><div class="rule"></div><div class="lbl">Cost down</div></div>
    <div class="stat"><div class="big">92%</div><div class="rule"></div><div class="lbl">Retention</div></div>
    <div class="stat"><div class="big">&lt;2&nbsp;wks</div><div class="rule"></div><div class="lbl">To onboard</div></div>
  </div>
</body>
</html>
