<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); padding: 26px 24px; }
  .lede { font-family: var(--font-body); font-size: var(--text-lede); color: var(--color-text-secondary); line-height: var(--leading-relaxed); max-width: 560px; margin: 0 0 12px; }
  .body { font-family: var(--font-body); font-size: var(--text-body); color: var(--color-text-secondary); line-height: var(--leading-relaxed); max-width: 560px; margin: 0; }
  .body strong, .lede strong { color: var(--color-text); font-weight: var(--weight-bold); }
</style>
</head>
<body>
  <p class="lede">Strategy looks good on paper. Execution depends on the people behind it.</p>
  <p class="body">Worktales helps organizations <strong>hire</strong>, <strong>develop</strong>, and <strong>align</strong> the talent that turns ambition into outcomes &mdash; identified through context, not just credentials.</p>
</body>
</html>
